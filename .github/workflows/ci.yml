name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: zal-analytics/zlicenser-protocol
          path: zlicenser-protocol
      - run: sed -i 's|path = "../zlicenser-protocol"|path = "zlicenser-protocol"|' Cargo.toml
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p zlicenser
      - run: cargo test -p zlicenser --all-features
      - run: cargo test -p zlicenser --no-default-features

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: zal-analytics/zlicenser-protocol
          path: zlicenser-protocol
      - run: sed -i 's|path = "../zlicenser-protocol"|path = "zlicenser-protocol"|' Cargo.toml
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --exclude zlicenser-gui --all-features -- -D warnings
      - run: cargo clippy -p zlicenser --no-default-features -- -D warnings

  clippy-gui:
    name: Clippy (GUI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: zal-analytics/zlicenser-protocol
          path: zlicenser-protocol
      - run: sed -i 's|path = "../zlicenser-protocol"|path = "zlicenser-protocol"|' Cargo.toml
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy -p zlicenser-gui -- -D warnings

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  deny:
    name: Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: zal-analytics/zlicenser-protocol
          path: zlicenser-protocol
      - run: sed -i 's|path = "../zlicenser-protocol"|path = "zlicenser-protocol"|' Cargo.toml
      - uses: EmbarkStudios/cargo-deny-action@v2

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: zal-analytics/zlicenser-protocol
          path: zlicenser-protocol
      - run: sed -i 's|path = "../zlicenser-protocol"|path = "zlicenser-protocol"|' Cargo.toml
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-audit --locked
      - run: cargo audit
