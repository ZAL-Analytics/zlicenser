[licenses]
private = { ignore = true }
unused-allowed-license = "allow"
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "CDLA-Permissive-2.0",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
]

[bans]
multiple-versions = "warn"

[advisories]
ignore = [
    # gtk3-rs bindings (no longer maintained; pulled in by Tauri on Linux, no upgrade path)
    "RUSTSEC-2024-0411", # atk
    "RUSTSEC-2024-0412", # atk-sys
    "RUSTSEC-2024-0413", # gdk
    "RUSTSEC-2024-0414", # gdk-sys
    "RUSTSEC-2024-0415", # gtk
    "RUSTSEC-2024-0416", # gdkwayland-sys
    "RUSTSEC-2024-0417", # gdkx11
    "RUSTSEC-2024-0418", # gdkx11-sys
    "RUSTSEC-2024-0419", # gtk3-macros
    "RUSTSEC-2024-0420", # gtk-sys
    # proc-macro-error (pulled in by glib-macros / Tauri, no upgrade path)
    "RUSTSEC-2024-0370",
    # paste (pulled in by ratatui, no upgrade path)
    "RUSTSEC-2024-0436",
    # fxhash (unmaintained, pulled in by Tauri dep chain)
    "RUSTSEC-2025-0057",
    # unic-* crates (pulled in by urlpattern / tauri-utils, no upgrade path)
    "RUSTSEC-2025-0075", # unic-char-range
    "RUSTSEC-2025-0080", # unic-common
    "RUSTSEC-2025-0081", # unic-char-property
    "RUSTSEC-2025-0098", # unic-ucd-version
    "RUSTSEC-2025-0100", # unic-ucd-ident
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
